display_information:
  name: PeakCam Data
  description: Data agent — SQL, analysis, dashboards, visualization, validation
  background_color: "#611f69"
  long_description: >-
    PeakCam's AI data teammate. Handles SQL queries, data exploration,
    statistical analysis, dashboards, data visualization, and data
    validation. Posts to #peakcam-data.

features:
  bot_user:
    display_name: PeakCam Data
    always_online: true

oauth_config:
  scopes:
    bot:
      - channels:history
      - channels:read
      - channels:join
      - chat:write
      - chat:write.customize
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - users:read
      - users:read.email
      - files:write
      - reactions:read
      - reactions:write

settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
