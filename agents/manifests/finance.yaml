display_information:
  name: PeakCam Finance
  description: Finance agent — journal entries, reconciliation, variance, close, audit
  background_color: "#1264a3"
  long_description: >-
    PeakCam's AI finance teammate. Handles journal entries, account
    reconciliation, financial statements, variance analysis, SOX testing,
    audit support, and month-end close management. Posts to #peakcam-finance.

features:
  bot_user:
    display_name: PeakCam Finance
    always_online: true

oauth_config:
  scopes:
    bot:
      - channels:history
      - channels:read
      - channels:join
      - chat:write
      - chat:write.customize
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - users:read
      - users:read.email
      - files:write
      - reactions:read
      - reactions:write

settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
