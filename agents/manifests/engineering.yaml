display_information:
  name: PeakCam Engineering
  description: Engineering agent — code review, standups, incidents, architecture
  background_color: "#4a154b"
  long_description: >-
    PeakCam's AI engineering teammate. Handles standups, code review,
    architecture decisions, incident response, deploy checklists,
    debugging, tech debt tracking, and documentation. Posts to #peakcam-engineering.

features:
  bot_user:
    display_name: PeakCam Engineering
    always_online: true

oauth_config:
  scopes:
    bot:
      - channels:history
      - channels:read
      - channels:join
      - chat:write
      - chat:write.customize
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - users:read
      - users:read.email
      - files:write
      - reactions:read
      - reactions:write

settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
