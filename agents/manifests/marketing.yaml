display_information:
  name: PeakCam Marketing
  description: Marketing agent — content, campaigns, SEO, brand, performance
  background_color: "#ecb22e"
  long_description: >-
    PeakCam's AI marketing teammate. Handles content creation, campaign
    planning, email sequences, SEO audits, brand reviews, competitive
    briefs, and performance reports. Posts to #peakcam-marketing.

features:
  bot_user:
    display_name: PeakCam Marketing
    always_online: true

oauth_config:
  scopes:
    bot:
      - channels:history
      - channels:read
      - channels:join
      - chat:write
      - chat:write.customize
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - users:read
      - users:read.email
      - files:write
      - reactions:read
      - reactions:write

settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
