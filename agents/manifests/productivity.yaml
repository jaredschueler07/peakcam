display_information:
  name: PeakCam Productivity
  description: Productivity agent — tasks, memory, daily planning, status updates
  background_color: "#2eb67d"
  long_description: >-
    PeakCam's AI productivity teammate. Handles task management, working
    memory, daily planning, and activity updates. Coordinates across all
    other agents. Posts to #peakcam-productivity.

features:
  bot_user:
    display_name: PeakCam Productivity
    always_online: true

oauth_config:
  scopes:
    bot:
      - channels:history
      - channels:read
      - channels:join
      - chat:write
      - chat:write.customize
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - users:read
      - users:read.email
      - files:write
      - reactions:read
      - reactions:write

settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
