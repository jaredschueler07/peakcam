display_information:
  name: PeakCam Product
  description: Product management agent — specs, roadmaps, research, sprint planning
  background_color: "#e01e5a"
  long_description: >-
    PeakCam's AI product management teammate. Handles feature specs,
    roadmap updates, sprint planning, stakeholder updates, user research
    synthesis, metrics reviews, and competitive briefs. Posts to #peakcam-product.

features:
  bot_user:
    display_name: PeakCam Product
    always_online: true

oauth_config:
  scopes:
    bot:
      - channels:history
      - channels:read
      - channels:join
      - chat:write
      - chat:write.customize
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - users:read
      - users:read.email
      - files:write
      - reactions:read
      - reactions:write

settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
