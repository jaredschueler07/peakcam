  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

o';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"661f22d3-4ae6-480a-9912-4b7726f604d7\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* -------- Palette: earth + snow --------------------------------- */\n  /* Paper / cream */\n  --pc-cream-50:   #faf4e6;   /* lightest paper */\n  --pc-cream:      #f1e7cf;   /* body bg */\n  --pc-cream-dk:   #e3d5b2;   /* hairline / card edge */\n\n  /* Bark */\n  --pc-bark-50:    #b59b74;\n  --pc-bark:       #7a5a3a;\n  --pc-bark-dk:    #4a3620;\n  --pc-ink:        #2a1f14;   /* body text, ink-stamp black-brown */\n\n  /* Forest */\n  --pc-forest-50:  #8aa37a;\n  --pc-forest:     #3c5a3a;   /* primary */\n  --pc-forest-dk:  #1f3322;\n\n  /* Sky / snow */\n  --pc-sky:        #c9d9d6;   /* cool grey-blue */\n  --pc-sky-dk:     #6c8a88;\n  --pc-snow:       #ffffff;\n\n  /* Alpenglow — single hot accent */\n  --pc-alpen:      #d9552f;   /* persimmon */\n  --pc-alpen-dk:   #a93f20;\n  --pc-mustard:    #e2a740;   /* secondary accent, for condition=GOOD */\n\n  /* Condition semantics (Great/Good/Fair/Poor) */\n  --pc-great:      #3c5a3a;   /* forest */\n  --pc-good:       #6d8a4a;   /* moss */\n  --pc-fair:       #e2a740;   /* mustard */\n  --pc-poor:       #a93f20;   /* alpen-dk */\n\n  /* -------- Type -------------------------------------------------- */\n  --pc-display: 'Fraunces', 'Recoleta', Georgia, serif;\n  --pc-sans:    'DM Sans', ui-sans-serif, system-ui, sans-serif;\n  --pc-mono:    'JetBrains Mono', ui-monospace, Menlo, monospace;\n\n  /* -------- Radii, shadow, spacing ------------------------------- */\n  --pc-r-sm: 4px;\n  --pc-r-md: 10px;\n  --pc-r-lg: 18px;\n  --pc-r-pill: 999px;\n\n  /* \"Stamped\" shadow — hard offset, no blur, for poster feel */\n  --pc-stamp:    3px 3px 0 var(--pc-ink);\n  --pc-stamp-lg: 6px 6px 0 var(--pc-ink);\n  --pc-stamp-alpen: 3px 3px 0 var(--pc-alpen-dk);\n\n  /* Soft shadow for lifted cards (used sparingly) */\n  --pc-soft: 0 8px 24px -12px rgba(42,31,20,.35);\n\n  /* Hairline border */\n  --pc-border: 1.5px solid var(--pc-ink);\n  --pc-border-thin: 1px solid var(--pc-bark);\n\n  /* Grain + topo textures — reusable backgrounds */\n  --pc-grain: url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 .16  0 0 0 0 .12  0 0 0 0 .08  0 0 0 .18 0'/><\u002Ffilter><rect width='100%25' height='100%25' filter='url(%23n)'/><\u002Fsvg>\");\n}\n\n/* -------- Base ---------------------------------------------------- */\nhtml, body {\n  background: var(--pc-cream);\n  color: var(--pc-ink);\n  font-family: var(--pc-sans);\n  font-size: 16px;\n  line-height: 1.45;\n  -webkit-font-smoothing: antialiased;\n}\n\n/* Paper background utility */\n.pc-paper {\n  background-color: var(--pc-cream);\n  background-image:\n    var(--pc-grain),\n    radial-gradient(1200px 600px at 10% -10%, rgba(217,85,47,.06), transparent 60%),\n    radial-gradient(900px 500px at 110% 10%, rgba(60,90,58,.08), transparent 60%);\n  background-size: 160px 160px, auto, auto;\n}\n\n/* Topo-line background — concentric contour curves */\n.pc-topo {\n  background-color: var(--pc-cream);\n  background-image:\n    repeating-radial-gradient(ellipse 120% 80% at 50% 100%,\n      transparent 0 22px,\n      rgba(74,54,32,.11) 22px 23px),\n    var(--pc-grain);\n  background-size: auto, 160px 160px;\n}\n\n/* -------- Type specimens ----------------------------------------- */\n.pc-display {\n  font-family: var(--pc-display);\n  font-weight: 900;\n  font-style: normal;\n  font-optical-sizing: auto;\n  letter-spacing: -0.02em;\n  line-height: 0.95;\n}\n.pc-display--italic { font-style: italic; font-weight: 700; }\n\n.pc-eyebrow {\n  font-family: var(--pc-sans);\n  font-weight: 700;\n  text-transform: uppercase;\n  letter-spacing: 0.16em;\n  font-size: 12px;\n  color: var(--pc-bark);\n}\n\n.pc-mono {\n  font-family: var(--pc-mono);\n  font-weight: 700;\n  letter-spacing: 0.02em;\n  font-variant-numeric: tabular-nums;\n}\n\n/* -------- Buttons ------------------------------------------------- */\n.pc-btn {\n  display: inline-flex; align-items: center; gap: 8px;\n  font-family: var(--pc-sans);\n  font-weight: 700;\n  font-size: 15px;\n  letter-spacing: 0.02em;\n  padding: 12px 20px;\n  border-radius: var(--pc-r-pill);\n  border: var(--pc-border);\n  background: var(--pc-snow);\n  color: var(--pc-ink);\n  box-shadow: var(--pc-stamp);\n  cursor: pointer;\n  transition: transform .08s ease, box-shadow .08s ease;\n  text-decoration: none;\n}\n.pc-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--pc-ink); }\n.pc-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--pc-ink); }\n\n.pc-btn--primary { background: var(--pc-forest); color: var(--pc-cream-50); }\n.pc-btn--accent  { background: var(--pc-alpen);  color: var(--pc-cream-50); }\n.pc-btn--ghost   { background: transparent; box-shadow: none; }\n.pc-btn--ghost:hover { background: rgba(42,31,20,.06); transform: none; box-shadow: none; }\n.pc-btn--sm { padding: 7px 14px; font-size: 13px; }\n\n/* -------- Chip / badge ------------------------------------------- */\n.pc-chip {\n  display: inline-flex; align-items: center; gap: 6px;\n  font-family: var(--pc-sans);\n  font-weight: 700;\n  font-size: 12px;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  padding: 5px 11px;\n  border-radius: var(--pc-r-pill);\n  border: var(--pc-border-thin);\n  background: var(--pc-cream-50);\n  color: var(--pc-ink);\n}\n.pc-chip--great { background: var(--pc-great); color: var(--pc-cream-50); border-color: var(--pc-forest-dk); }\n.pc-chip--good  { background: var(--pc-good);  color: var(--pc-cream-50); border-color: var(--pc-forest-dk); }\n.pc-chip--fair  { background: var(--pc-fair);  color: var(--pc-ink); border-color: var(--pc-bark-dk); }\n.pc-chip--poor  { background: var(--pc-poor);  color: var(--pc-cream-50); border-color: var(--pc-bark-dk); }\n.pc-chip--state { background: var(--pc-ink); color: var(--pc-cream-50); font-family: var(--pc-mono); letter-spacing: 0.1em; }\n\n/* -------- Card --------------------------------------------------- */\n.pc-card {\n  background: var(--pc-cream-50);\n  border: var(--pc-border);\n  border-radius: var(--pc-r-lg);\n  box-shadow: var(--pc-stamp);\n  overflow: hidden;\n}\n\n/* -------- Stat readout ------------------------------------------- */\n.pc-stat {\n  display: flex; flex-direction: column; gap: 2px;\n}\n.pc-stat__num {\n  font-family: var(--pc-display);\n  font-weight: 900;\n  font-size: 44px;\n  line-height: 1;\n  letter-spacing: -0.02em;\n}\n.pc-stat__label {\n  font-family: var(--pc-sans);\n  font-size: 11px;\n  font-weight: 700;\n  text-transform: uppercase;\n  letter-spacing: 0.14em;\n  color: var(--pc-bark);\n}\n\n/* -------- Divider ------------------------------------------------ */\n.pc-rule {\n  border: 0;\n  border-top: 1.5px dashed var(--pc-bark);\n  opacity: .7;\n}\n\n/* -------- Form --------------------------------------------------- */\n.pc-input {\n  width: 100%;\n  font-family: var(--pc-sans);\n  font-size: 15px;\n  color: var(--pc-ink);\n  background: var(--pc-snow);\n  border: var(--pc-border);\n  border-radius: var(--pc-r-pill);\n  padding: 11px 18px;\n  box-shadow: var(--pc-stamp);\n  outline: none;\n}\n.pc-input::placeholder { color: var(--pc-bark); }\n.pc-input:focus { box-shadow: 4px 4px 0 var(--pc-alpen-dk); border-color: var(--pc-alpen-dk); }\n<\u002Fstyle>\n<script src=\"312b8f6e-bf80-4725-ba19-f8be623b7019\"><\u002Fscript>\n\n<style>\n  html, body { margin: 0; background: #000; }\n\n  /* Every slide is 1920x1080; deck_stage scales to viewport */\n  .slide {\n    width: 1920px; height: 1080px;\n    background: var(--pc-cream);\n    color: var(--pc-ink);\n    position: relative;\n    overflow: hidden;\n    font-family: var(--pc-sans);\n  }\n  .slide.paper {\n    background-color: var(--pc-cream);\n    background-image:\n      url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 .16  0 0 0 0 .12  0 0 0 0 .08  0 0 0 .18 0'/><\u002Ffilter><rect width='100%25' height='100%25' filter='url(%23n)'/><\u002Fsvg>\"),\n      radial-gradient(1800px 900px at 0% 0%, rgba(217,85,47,.06), transparent 60%),\n      radial-gradient(1600px 900px at 110% 110%, rgba(60,90,58,.09), transparent 60%);\n  }\n  .slide.forest { background: var(--pc-forest); color: var(--pc-cream-50); }\n  .slide.ink { background: var(--pc-ink); color: var(--pc-cream-50); }\n\n  /* Reusable slide frame */\n  .pad { padding: 96px 120px; box-sizing: border-box; width:100%; height:100%; position:relative; }\n  .header-row {\n    display: flex; justify-content: space-between; align-items: center;\n    margin-bottom: 48px;\n  }\n  .brand {\n    font-family: var(--pc-display); font-weight: 900;\n    font-size: 42px; letter-spacing: -0.02em;\n  }\n  .brand em { color: var(--pc-alpen); font-style: italic; }\n  .slide.forest .brand em, .slide.ink .brand em { color: var(--pc-mustard); }\n  .slide-no {\n    font-family: var(--pc-mono); font-weight: 700;\n    font-size: 18px; letter-spacing: .18em;\n    color: var(--pc-bark);\n  }\n  .slide.forest .slide-no, .slide.ink .slide-no { color: var(--pc-cream-50); opacity: .6; }\n  .kicker {\n    font-family: var(--pc-sans); font-weight: 700;\n    font-size: 20px; letter-spacing: .24em; text-transform: uppercase;\n    color: var(--pc-bark);\n  }\n  .slide.forest .kicker { color: var(--pc-mustard); }\n  .slide.ink .kicker { color: var(--pc-alpen); }\n\n  /* ============ SLIDE 1 — TITLE (poster) ============ */\n  .s-title .pad { padding: 0; display: grid; grid-template-rows: auto 1fr auto;}\n  .s-title .top-bar { padding: 60px 120px 0; display:flex; justify-content:space-between; align-items:center; }\n  .s-title .middle { padding: 40px 120px; display:flex; flex-direction:column; justify-content:center;\n                     position: relative; }\n  .s-title h1 {\n    font-family: var(--pc-display); font-weight: 900;\n    font-size: 320px; line-height: .84; letter-spacing: -0.04em;\n    margin: 0;\n    position: relative; z-index: 2;\n  }\n  .s-title h1 em { font-style: italic; font-weight: 700; color: var(--pc-alpen); }\n  .s-title .sub {\n    font-family: var(--pc-sans); font-size: 38px; font-weight: 500;\n    margin-top: 28px; max-width: 1100px; line-height: 1.2; color: var(--pc-ink);\n    position: relative; z-index: 2;\n  }\n  .s-title .bot-bar {\n    padding: 40px 120px 60px;\n    display:flex; justify-content: space-between; align-items: flex-end;\n    border-top: 3px solid var(--pc-ink);\n    margin: 0 120px 0; /* visual only */\n  }\n  .s-title .meta {\n    font-family: var(--pc-mono); font-weight: 700;\n    font-size: 22px; letter-spacing: .14em; text-transform: uppercase;\n    line-height: 1.5;\n  }\n  .s-title .meta .s { color: var(--pc-bark); }\n  .s-title .sticker {\n    width: 260px; height: 260px; border-radius: 50%;\n    display: grid; place-items: center;\n    font-family: var(--pc-display); font-weight: 900;\n    color: var(--pc-cream-50); text-align:center; line-height: 1;\n    background: var(--pc-alpen);\n    border: 6px solid var(--pc-ink);\n    box-shadow: 12px 12px 0 var(--pc-ink);\n    transform: rotate(-8deg);\n    font-size: 28px; letter-spacing: .02em;\n    position: absolute; right: 140px; top: 140px;\n  }\n  .s-title .sticker span { display:block; font-size: 80px; margin: 8px 0; letter-spacing: -.02em; }\n  /* Background range */\n  .s-title .range {\n    position: absolute; left:0; right:0; bottom: 280px; height: 420px;\n    z-index: 1; opacity: .18; pointer-events:none;\n  }\n\n  /* ============ SLIDE 2 — SECTION DIVIDER ============ */\n  .s-section .pad { display:flex; flex-direction:column; justify-content:center; align-items:flex-start; }\n  .s-section h1 {\n    font-family: var(--pc-display); font-weight: 900;\n    font-size: 240px; line-height: .9; letter-spacing: -.03em;\n    margin: 20px 0 0;\n  }\n  .s-section h1 em { font-style: italic; color: var(--pc-mustard); }\n  .s-section .kicker { margin-bottom: 0; }\n  .s-section .num {\n    font-family: var(--pc-mono); font-weight: 700;\n    font-size: 120px; line-height: 1; color: var(--pc-mustard);\n    margin-bottom: 30px;\n  }\n  .s-section .rule {\n    width: 420px; height: 8px; background: var(--pc-mustard);\n    margin-top: 80px;\n  }\n  .s-section .note {\n    font-family: var(--pc-sans); font-size: 30px;\n    color: var(--pc-cream-50); opacity: .8;\n    margin-top: 40px; max-width: 900px; line-height: 1.35;\n  }\n  .s-section .topo-bg {\n    position:absolute; inset:0; opacity: .12; pointer-events:none;\n    background-image: repeating-radial-gradient(ellipse 160% 90% at 110% 110%,\n      transparent 0 56px, rgba(241,231,207,.55) 56px 58px);\n  }\n\n  /* ============ SLIDE 3 — COMPARISON (two-column) ============ */\n  .s-cmp .pad { padding: 96px 120px 80px; }\n  .s-cmp .title {\n    font-family: var(--pc-display); font-weight: 900;\n    font-size: 112px; line-height: .92; letter-spacing: -.03em;\n    margin: 0 0 56px; max-width: 1500px;\n  }\n  .s-cmp .title em { font-style: italic; color: var(--pc-alpen); }\n  .cmp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }\n  .cmp-card {\n    background: var(--pc-cream-50);\n    border: 3px solid var(--pc-ink);\n    border-radius: 28px;\n    padding: 44px 44px 40px;\n    box-shadow: 10px 10px 0 var(--pc-ink);\n    position: relative;\n  }\n  .cmp-card.forest { background: var(--pc-forest); color: var(--pc-cream-50); }\n  .cmp-card .h {\n    font-family: var(--pc-display); font-weight: 900;\n    font-size: 64px; letter-spacing: -.02em; margin: 0;\n    line-height: .95;\n  }\n  .cmp-card .region {\n    font-family: var(--pc-sans); font-size: 24px;\n    color: var(--pc-bark); margin: 12px 0 28px;\n  }\n  .cmp-card.forest .region { color: var(--pc-mustard); }\n  .cmp-card .stats {\n    display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;\n    padding: 28px 0;\n    border-top: 2px dashed var(--pc-bark);\n    border-bottom: 2px dashed var(--pc-bark);\n  }\n  .cmp-card.forest .stats { border-color: rgba(241,231,207,.35); }\n  .cmp-card .stats .k {\n    font-family: var(--pc-sans); font-size: 16px; letter-spacing: .16em;\n    text-transform: uppercase; color: var(--pc-bark); margin-bottom: 4px;\n  }\n  .cmp-card.forest .stats .k { color: var(--pc-mustard); opacity: .9; }\n  .cmp-card .stats .v {\n    font-family: var(--pc-display); font-weight: 900; font-size: 60px; line-height: 1;\n    letter-spacing: -.01em;\n  }\n  .cmp-card .stats .v em { color: var(--pc-alpen); font-style: normal; }\n  .cmp-card.forest .stats .v em { color: var(--pc-mustard); }\n  .cmp-card .foot {\n    display:flex; justify-content: space-between; align-items: center;\n    margin-top: 28px;\n  }\n  .cmp-card .foot .bigchip {\n    font-family: var(--pc-sans); font-weight: 700;\n    font-size: 22px; letter-spacing: .14em; text-transform: uppercase;\n    padding: 10px 22px; border-radius: 999px;\n    border: 2px solid var(--pc-ink);\n  }\n  .cmp-card .foot .great { background: var(--pc-mustard); color: var(--pc-ink); }\n  .cmp-card .foot .fair  { background: var(--pc-fair); color: var(--pc-ink); border-color: var(--pc-bark-dk); }\n  .cmp-card .stamp {\n    position: absolute; top: -26px; right: 40px;\n    background: var(--pc-alpen); color: var(--pc-cream-50);\n    font-family: var(--pc-display); font-weight: 900; font-size: 26px;\n    letter-spacing: .08em; padding: 10px 20px;\n    border: 3px solid var(--pc-ink); border-radius: 999px;\n    box-shadow: 4px 4px
